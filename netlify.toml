[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA redirect for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Scheduled Functions for Automated Updates
[[plugins]]
  package = "@netlify/plugin-functions"

# Schedule Google Sheets monitoring every 4 hours
[[functions]]
  function = "scheduled-sheets-update"
  schedule = "0 */4 * * *"  # Every 4 hours

# Schedule daily AI content generation at 10 PM
[[functions]]
  function = "scheduled-ai-update"
  schedule = "0 22 * * *"   # 10 PM daily

# Weekly pool summary generation on Monday mornings
[[functions]]
  function = "scheduled-weekly-summary"
  schedule = "0 10 * * 1"   # Monday 10 AM

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"